<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Background and Glow Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c1b"/>
      <stop offset="100%" stop-color="#05020a"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b63bff"/>
      <stop offset="50%" stop-color="#863bff"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#863bff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Dark Rounded Base -->
  <rect x="5" y="5" width="90" height="90" rx="20" fill="url(#bgGrad)" stroke="#1f1a3a" stroke-width="2"/>

  <!-- CPU Outer Pins / Connectors -->
  <g stroke="#863bff" stroke-width="3" stroke-linecap="round" opacity="0.8">
    <!-- Top Pins -->
    <line x1="30" y1="20" x2="30" y2="10" />
    <line x1="50" y1="20" x2="50" y2="10" />
    <line x1="70" y1="20" x2="70" y2="10" />
    <!-- Bottom Pins -->
    <line x1="30" y1="80" x2="30" y2="90" />
    <line x1="50" y1="80" x2="50" y2="90" />
    <line x1="70" y1="80" x2="70" y2="90" />
    <!-- Left Pins -->
    <line x1="20" y1="30" x2="10" y2="30" />
    <line x1="20" y1="50" x2="10" y2="50" />
    <line x1="20" y1="70" x2="10" y2="70" />
    <!-- Right Pins -->
    <line x1="80" y1="30" x2="90" y2="30" />
    <line x1="80" y1="50" x2="90" y2="50" />
    <line x1="80" y1="70" x2="90" y2="70" />
  </g>

  <!-- CPU Body -->
  <rect x="20" y="20" width="60" height="60" rx="12" fill="#130f26" stroke="url(#coreGrad)" stroke-width="3.5" filter="url(#glow)"/>

  <!-- Inner Chip Core -->
  <rect x="35" y="35" width="30" height="30" rx="6" fill="url(#coreGrad)"/>

  <!-- Central Glowing Node -->
  <circle cx="50" cy="50" r="6" fill="#ffffff" filter="url(#glow)"/>
</svg>